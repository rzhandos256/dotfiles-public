# --- 1. ГЛОБАЛЬНЫЕ НАСТРОЙКИ ---
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g focus-events on

# Индексация с 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Мгновенный выход из Insert в Vim/vi
set -s escape-time 0
set -g history-limit 50000

# --- 2. ГОРЯЧИЕ КЛАВИШИ ---
# Переключение окон через Ctrl+h и Ctrl+l (удобно)
bind-key -n C-l next-window
bind-key -n C-h previous-window

# Перезагрузка конфига
bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# --- 3. ПЛАГИНЫ ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-vim 'session'

# --- 4. ЧИСТЫЙ МИНИМАЛИЗМ (ИНТЕРФЕЙС) ---
set -g status-interval 1
set -g status-position bottom
set -g status-justify left

# Прозрачный фон для всего бара
set -g status-style "bg=default"

# Левая часть: Сессия (Синий акцент)
set -g status-left "#[fg=#007aff,bold]#S #[fg=#3a3a3c,nobold]⏐ "
set -g status-left-length 20

# Правая часть: Время (Тускло-белое)
set -g status-right "#[fg=#8e8e93,bg=default] %H:%M "
set -g status-right-length 20

# --- НАСТРОЙКА ВКЛАДОК ---
# Неактивные: теперь они темнее (#48484a), чтобы не отвлекать
setw -g window-status-style "fg=#48484a,bg=default"
setw -g window-status-format " #I:#W "

# Гасим "последнюю" использованную вкладку (убираем лишние символы)
setw -g window-status-last-style "fg=#48484a,bg=default"

# Активная вкладка: Ярко-синяя и жирная (в цвет сессии)
setw -g window-status-current-style "fg=#007aff,bg=default,bold"
setw -g window-status-current-format " #I:#W "

setw -g window-status-separator ""

# --- 5. ИНИЦИАЛИЗАЦИЯ TPM ---
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

run '~/.tmux/plugins/tpm/tpm'
